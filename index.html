<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ số từ Supabase - Leaflet</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh; /* Bản đồ tràn toàn màn hình */
        }
        .loading-pane {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px; border-radius: 5px;
            z-index: 1000; font-family: Arial, sans-serif;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-pane">Đang tải dữ liệu bản đồ...</div>
    <div id="map"></div>

    <script>
        // 3. Cấu hình Supabase (Thay thông số của bạn tại đây)
        const SUPABASE_URL = 'https://nbxzgfindvtcwxqlnkag.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ZSjTOn9EAuArh3yLkSqo3w_U1ltcTAX';
       const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 4. Khởi tạo Bản đồ Leaflet, mặc định tâm ở TP.HCM
        const map = L.map('map').setView([10.762622, 106.660172], 11);

        // Thêm lớp Bản đồ nền (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 5. Hàm lấy dữ liệu và hiển thị lên bản đồ
        async function loadMapData() {
            // Truy vấn cột thông tin và cột tọa độ hình học (geom) từ bảng rg-ttvt
            // Ở đây ta dùng hàm ST_AsGeoJSON(geom) của PostGIS để chuyển tọa độ Postgres thành mã GeoJSON cho Leaflet đọc
            const { data, error } = await supabase
                .from('rg-ttvt')
                .select('*, geojson:geom'); // Hoặc select('id, name, geom') tùy thuộc vào các cột bạn có khi import

            if (error) {
                console.error('Lỗi lấy dữ liệu:', error);
                document.getElementById('loading').innerText = 'Lỗi tải dữ liệu!';
                return;
            }

            if (data && data.length > 0) {
                // Tạo một mảng lưu trữ các tính năng GeoJSON
                const geojsonFeatures = [];

                data.forEach(item => {
                    // Nếu dữ liệu geom được trả về dưới dạng Object GeoJSON sẵn từ Supabase
                    if (item.geojson) {
                        geojsonFeatures.push({
                            "type": "Feature",
                            "geometry": typeof item.geojson === 'string' ? JSON.parse(item.geojson) : item.geojson,
                            "properties": {
                                "id": item.id,
                                "name": item.name || item.ten || "Đối tượng không tên"
                                // Bạn có thể thêm các thuộc tính khác của bảng vào đây để hiển thị khi click
                            }
                        });
                    }
                });

                // Tạo đối tượng GeoJSON hoàn chỉnh
                const geojsonLayerData = {
                    "type": "FeatureCollection",
                    "features": geojsonFeatures
                };

                // Vẽ dữ liệu GeoJSON lên bản đồ Leaflet
                const geoLayer = L.geoJSON(geojsonLayerData, {
                    style: function (feature) {
                        return { color: "#2ecc71", weight: 3, opacity: 0.8, fillOpacity: 0.4 }; // Cấu hình màu sắc cho Vùng/Đường
                    },
                    onEachFeature: function (feature, layer) {
                        // Thêm bong bóng thông tin (Popup) khi bấm vào đối tượng
                        if (feature.properties && feature.properties.name) {
                            layer.bindPopup(`<b>Thông tin:</b> ${feature.properties.name}`);
                        }
                    }
                }).addTo(map);

                // Tự động thu phóng bản đồ vừa vặn với toàn bộ vùng dữ liệu được tải lên
                map.fitBounds(geoLayer.getBounds());
            }

            // Ẩn bảng thông báo đang tải
            document.getElementById('loading').style.display = 'none';
        }

        // Chạy hàm tải bản đồ
        loadMapData();
    </script>
</body>
</html>
